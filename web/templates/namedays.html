<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Name Days — Birthday Reminder</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; color: #222; background: #fff; }
    h1 { margin-bottom: 24px; }
    nav { margin-bottom: 24px; }
    nav a { margin-right: 16px; color: inherit; text-decoration: none; font-size: 0.95em; opacity: 0.6; }
    nav a:hover { opacity: 1; }
    nav a.active { opacity: 1; font-weight: bold; border-bottom: 2px solid currentColor; padding-bottom: 2px; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 40px; }
    th { text-align: left; border-bottom: 2px solid #ddd; padding: 8px 12px; }
    td { padding: 8px 12px; border-bottom: 1px solid #eee; }
    tr:hover td { background: #f9f9f9; }
    tr.today td { background: #fffbe6; font-weight: 500; }
    .date { white-space: nowrap; color: #888; font-size: 0.9em; }

    #theme-toggle { position: fixed; top: 16px; right: 20px; background: none; border: 1px solid #ccc; color: inherit; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.9em; }
    #theme-toggle:hover { background: #eee; }

    body.dark { background: #1a1a1a; color: #ddd; }
    body.dark th { border-bottom-color: #444; }
    body.dark td { border-bottom-color: #333; }
    body.dark tr:hover td { background: #252525; }
    body.dark tr.today td { background: #2a2700; }
    body.dark .date { color: #888; }
    body.dark #theme-toggle { border-color: #555; }
    body.dark #theme-toggle:hover { background: #2a2a2a; }
  </style>
</head>
<body>
  <button id="theme-toggle" onclick="toggleTheme()">🌙 Dark</button>

  <nav>
    <a href="/">Birthdays</a>
    <a href="/namedays" class="active">Name Days</a>
  </nav>

  <h1>Name Days</h1>

  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Names</th>
      </tr>
    </thead>
    <tbody>
      {% for row in rows %}
      <tr{% if row.month == today_month and row.day == today_day %} class="today"{% endif %}>
        <td class="date">{{ '%02d/%02d' % (row.day, row.month) }}</td>
        <td>{{ row.names | join(', ') }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>

  <script>
    const btn = document.getElementById('theme-toggle');

    function applyTheme(dark) {
      document.body.classList.toggle('dark', dark);
      btn.textContent = dark ? '☀️ Light' : '🌙 Dark';
    }

    function toggleTheme() {
      const dark = !document.body.classList.contains('dark');
      localStorage.setItem('theme', dark ? 'dark' : 'light');
      applyTheme(dark);
    }

    applyTheme(localStorage.getItem('theme') === 'dark');
  </script>
</body>
</html>
